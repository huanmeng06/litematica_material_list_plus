name: Verify version branch

on:
  push:
    branches:
      - mc1.20.1
      - mc1.20.4
      - mc1.20.6
      - mc1.21.1
      - mc1.21.10
      - mc1.21.11
      - mc26.1.2
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout version source
        uses: actions/checkout@v4

      - name: Checkout management tools
        uses: actions/checkout@v4
        with:
          ref: main
          path: .lmlp-management

      - name: Read version metadata
        id: version
        shell: bash
        run: |
          branch="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          python3 .lmlp-management/tools/lmlp.py ci-metadata --branch "$branch" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.version.outputs.java }}
          cache: gradle

      - name: Build
        run: |
          python3 .lmlp-management/tools/lmlp.py prepare "${{ steps.version.outputs.minecraft }}" --source .
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Verify JAR and regression guards
        run: >-
          python3 .lmlp-management/tools/lmlp.py ci-verify
          "${{ steps.version.outputs.minecraft }}"
          --source .
