name: Verify all supported versions

on:
  push:
    branches: [main]
    paths:
      - versions.toml
      - tools/**
      - .github/workflows/verify-all.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: mc1.20.1
            minecraft: 1.20.1
            java: 21
          - branch: mc1.20.4
            minecraft: 1.20.4
            java: 21
          - branch: mc1.20.6
            minecraft: 1.20.6
            java: 21
          - branch: mc1.21.1
            minecraft: 1.21.1
            java: 21
          - branch: mc1.21.10
            minecraft: 1.21.10
            java: 21
          - branch: mc1.21.11
            minecraft: 1.21.11
            java: 21
          - branch: mc26.1.2
            minecraft: 26.1.2
            java: 26
    runs-on: ubuntu-latest
    name: Minecraft ${{ matrix.minecraft }}
    steps:
      - name: Checkout version source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          path: source

      - name: Checkout management tools
        uses: actions/checkout@v4
        with:
          ref: main
          path: management

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
          cache-dependency-path: source/*.gradle*

      - name: Build
        working-directory: source
        run: |
          python3 ../management/tools/lmlp.py prepare "${{ matrix.minecraft }}" --source .
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Verify JAR and regression guards
        run: >-
          python3 management/tools/lmlp.py ci-verify
          "${{ matrix.minecraft }}"
          --source source
